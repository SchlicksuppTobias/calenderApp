<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalender</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
<div id="app">
    <div class="cal-header">
        <div style="display:flex;align-items:center;gap:8px;">
            <select class="cal-select" id="month-select" onchange="onMonthChange(this.value)" aria-label="Monat auswählen"></select>
            <select class="cal-select year-select" id="year-select" onchange="onYearChange(this.value)" aria-label="Jahr auswählen"></select>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
            <button class="today-btn" onclick="goToday()">Heute</button>
            <div class="nav-btns">
                <button class="nav-btn" onclick="prevMonth()" aria-label="Vorheriger Monat">&#8249;</button>
                <button class="nav-btn" onclick="nextMonth()" aria-label="Nächster Monat">&#8250;</button>
            </div>
        </div>
    </div>

    <div class="cal-grid">
        <div class="weekdays">
            <div class="weekday">Mo</div>
            <div class="weekday">Di</div>
            <div class="weekday">Mi</div>
            <div class="weekday">Do</div>
            <div class="weekday">Fr</div>
            <div class="weekday weekend">Sa</div>
            <div class="weekday weekend">So</div>
        </div>
        <div class="days" id="days"></div>
    </div>
</div>

<!-- Day Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
    <div class="modal" id="modal">
        <h2 id="modal-title">Tag</h2>
        <div class="event-list" id="modal-events"></div>
        <input type="text" id="event-input" placeholder="Neues Ereignis…" maxlength="60" />
        <div class="color-picker" id="color-picker">
            <div class="color-dot c-default selected" data-color="default" onclick="selectColor(this)"></div>
            <div class="color-dot c-blue"    data-color="blue"    onclick="selectColor(this)"></div>
            <div class="color-dot c-green"   data-color="green"   onclick="selectColor(this)"></div>
            <div class="color-dot c-red"     data-color="red"     onclick="selectColor(this)"></div>
            <div class="color-dot c-amber"   data-color="amber"   onclick="selectColor(this)"></div>
        </div>
        <div class="modal-actions">
            <button class="btn" onclick="closeModal()">Schließen</button>
            <button class="btn primary" onclick="addEvent()">Hinzufügen</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
